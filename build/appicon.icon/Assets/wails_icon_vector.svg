<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="100%" height="100%" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <g fill="#1d1d1f" fill-rule="evenodd">
    <!-- Rim (annulus): outer circle minus inner circle -->
    <path fill-rule="evenodd" d="M256,76 a180,180 0 1,0 0.1,0 Z M256,128 a128,128 0 1,1 -0.1,0 Z"/>
    <!-- Eight spokes / handles: four diameter bars rotated 0/45/90/135 -->
    <rect x="51" y="243" width="410" height="26" rx="13"/>
    <rect x="51" y="243" width="410" height="26" rx="13" transform="rotate(45 256 256)"/>
    <rect x="51" y="243" width="410" height="26" rx="13" transform="rotate(90 256 256)"/>
    <rect x="51" y="243" width="410" height="26" rx="13" transform="rotate(135 256 256)"/>
    <!-- Hub -->
    <circle cx="256" cy="256" r="54"/>
  </g>
</svg>
