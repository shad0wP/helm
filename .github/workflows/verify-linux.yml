name: Verify Linux

# Proves the released Arch package installs on real Arch Linux (what CachyOS is
# based on) and that the app launches end-to-end. The launch test runs Arch in a
# privileged Docker container on the runner host, where we can relax the user
# namespace restriction that WebKitGTK 6.0's bubblewrap sandbox requires.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to verify"
        required: false
        default: "v0.1.0"

permissions:
  contents: read

jobs:
  verify-arch:
    name: Install & launch on Arch Linux
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || 'v0.1.0' }}
    steps:
      - name: Relax unprivileged user-namespace restriction (host)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Download released Arch package
        run: |
          set -eux
          mkdir -p pkg
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" -p '*.pkg.tar.zst' -D pkg
          ls -la pkg

      - name: Write in-container verification script
        run: |
          cat > verify-in-arch.sh <<'EOS'
          #!/usr/bin/env bash
          set -euxo pipefail

          # Tooling needed to install the package and run the app headless.
          pacman -Syu --noconfirm --needed xorg-server-xvfb dbus mesa ttf-dejavu

          # Install the actual released package (pacman resolves gtk4 + webkitgtk-6.0).
          pacman -U --noconfirm /work/pkg/*.pkg.tar.zst
          echo "--- installed files ---"
          pacman -Ql helm | grep -E 'bin/helm|\.desktop|\.png'
          echo "--- declared dependencies ---"
          pacman -Qi helm | grep -i 'depends on'

          # Every shared library must resolve against the installed Arch stack.
          BIN=/usr/local/bin/helm
          ldd "$BIN"
          if ldd "$BIN" | grep -i 'not found'; then
            echo "FAIL: unresolved shared libraries"; exit 1
          fi
          echo "OK: all shared libraries resolved"

          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export LIBGL_ALWAYS_SOFTWARE=1
          export GALLIUM_DRIVER=llvmpipe
          export GDK_BACKEND=x11

          dbus-run-session -- xvfb-run -a -s "-screen 0 1280x1024x24" bash -c '
            set -x
            helm > /tmp/helm.log 2>&1 &
            PID=$!
            sleep 12
            STATUS=0
            if kill -0 "$PID" 2>/dev/null; then
              echo "RESULT: PASS - helm launched and stayed alive for 12s (PID $PID)"
              kill -TERM "$PID" 2>/dev/null || true
              sleep 1
            else
              echo "RESULT: FAIL - helm exited prematurely"
              STATUS=1
            fi
            echo "========== helm runtime log =========="
            cat /tmp/helm.log || true
            echo "======================================"
            exit $STATUS
          '
          EOS
          chmod +x verify-in-arch.sh

      - name: Run Arch container (privileged) and verify
        run: |
          set -eux
          docker run --rm --privileged --shm-size=1g \
            -v "$PWD:/work" -w /work \
            archlinux:latest \
            bash /work/verify-in-arch.sh
