name: Security Audit

# Gates dependency security on every push/PR and weekly (to catch newly
# disclosed advisories against already-pinned versions).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: Go vulnerabilities (govulncheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + WebKitGTK 6.0 (cgo build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-4-dev libwebkitgtk-6.0-dev

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Satisfy //go:embed frontend/dist
        run: |
          mkdir -p frontend/dist
          echo '<!doctype html>' > frontend/dist/index.html

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Scope to the app binary's package (avoids the unused iOS/Android scaffold
      # stubs under build/). Exits non-zero if a reachable vulnerability exists.
      - name: Run govulncheck
        run: govulncheck .

  npm-audit:
    name: npm dependencies (GitHub Advisory DB)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
